{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BarberSpringfield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div class="registro-wrapper">
        <div class="registro-card">
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold">Barber<span style="color:#C9A87C;">Springfield</span></h1>
                <p class="text-light-brown">
    Inicio de Sesión
</p>
                <h3 style="color:red;">
    {{ mensaje_prueba }}
</h3>
            </div>

            {% if messages %}
                <div class="container mt-3">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-yellow">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control form-control-registro" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-yellow">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-registro" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'registro' %}" class="text-light-brown">¿No tienes cuenta? Regístrate</a>
            </div>
            <div class="text-center mt-3">
                <a href="{% url 'inicio' %}" class="link-registro">
                    <i class="bi bi-arrow-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
