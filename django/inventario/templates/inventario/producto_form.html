{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} - BarberSpringfield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0B0A08;
            color: #F5EFE6;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        .navbar-custom {
            background-color: #0B0A08;
            border-bottom: 2px solid #F4C542;
            padding: 0.8rem 0;
        }
        .navbar-brand-custom {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #F4C542 !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar-brand-custom span { color: #C9A87C; }
        .navbar-brand-custom img {
            height: 40px; width: 40px; object-fit: cover; border-radius: 50%;
        }
        .card-custom {
            background-color: #1E1A15;
            border-radius: 20px;
            border: 1px solid rgba(244, 197, 66, 0.2);
            overflow: hidden;
        }
        .card-header-custom {
            background-color: #0B0A08;
            border-bottom: 2px solid #F4C542;
            padding: 1rem 1.25rem;
            font-weight: 600;
            color: #FFD966;
        }
        .form-label-custom {
            color: #FFD966;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .bg-dark-input {
            background-color: #2A211B !important;
            border: 1px solid #3F2E22 !important;
            color: #F5EFE6 !important;
        }
        .bg-dark-input:focus {
            background-color: #352b23 !important;
            border-color: #F4C542 !important;
            box-shadow: 0 0 0 0.2rem rgba(244, 197, 66, 0.25);
        }
        .btn-modern {
            background: linear-gradient(135deg, #F4C542 0%, #FFD966 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            color: #0B0A08;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-modern:hover { color: #0B0A08; }
        .text-yellow { color: #F4C542 !important; }
    </style>
</head>

<body>

    <nav class="navbar-custom">
        <div class="container">
            <a class="navbar-brand-custom" href="{% url 'inicio' %}">
                <img src="{% static 'logo.jpeg' %}" alt="Logo"> Barber <span>Springfield</span>
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <i class="bi bi-box-seam"></i> {{ titulo }}
                    </div>
                    <div class="card-body p-4">

                        {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label-custom">
                                    {{ field.label }}
                                </label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                                {% endif %}
                            </div>
                            {% endfor %}
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn-modern">
                                    <i class="bi bi-check-circle"></i> Guardar
                                </button>
                                <a href="{% url 'inventario:dashboard' %}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancelar
                                </a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
