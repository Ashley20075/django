{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h5>
                </div>
                <div class="card-body text-center py-4">
                    <i class="bi bi-trash3 text-danger fs-1 mb-3 d-inline-block"></i>
                    <p class="fs-5 text-white">¿Estás seguro de eliminar este producto?</p>
                    <p class="text-light-brown">Producto: <strong class="text-white">{{ producto.nombre }}</strong></p>
                    <p class="text-warning small">⚠️ Esta acción no se puede deshacer.</p>
                </div>
                <div class="card-footer bg-dark border-danger">
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'inventario:dashboard' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <form method="POST">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Eliminar Producto
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
